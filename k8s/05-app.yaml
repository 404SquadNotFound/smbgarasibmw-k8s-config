apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-app
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
      - name: laravel
        image: rakadarma/smb-garasibmw:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: app-key
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-root-password
---
apiVersion: v1
kind: Service
metadata:
  name: laravel-service
  namespace: myapp
spec:
  type: NodePort
  selector:
    app: laravel
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
