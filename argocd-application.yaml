apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smbgarasibmw-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/404SquadNotFound/smbgarasibmw-k8s-config.git' # Gunakan URL Repo Kedua
    targetRevision: main
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: myapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
